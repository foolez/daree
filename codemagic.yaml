workflows:
  ios-release:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - supabase_vars # Codemagic panelinden eklediğin grup
      vars:
        # Eğer paneldeki grup çalışmazsa buraya gerçek URL ve Key'ini yazabilirsin
        NEXT_PUBLIC_SUPABASE_URL: "SENİN_SUPABASE_URL_BURAYA"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "SENİN_ANON_KEY_BURAYA"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.daree.app
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/ios
      - name: Build Web Assets (Next.js Export)
        script: |
          # Supabase anahtarları olmadan bu adım hata verir
          npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.daree.app" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - supabase_vars
      vars:
        # Paneldeki grup çalışmazsa burası kurtarır:
        NEXT_PUBLIC_SUPABASE_URL: "SENİN_SUPABASE_URL_BURAYA"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "SENİN_ANON_KEY_BURAYA"
      node: 22
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web Assets (Next.js Export)
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk